apiVersion: apps/v1
kind: Deployment
metadata:
  name: mining-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mining-ai
  template:
    metadata:
      labels:
        app: mining-ai
    spec:
      imagePullSecrets:
      - name: regcred

      containers:
      - name: mining-ai
        image: docker.io/ashirakh/mining-ai:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"